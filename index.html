<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talas_profi | Shield AI 12-Modules</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        :root {
            --brand-yellow: #FBBF24;
            --brand-black: #000000;
            --brand-dark: #1a1a1a;
            --module-width: 44px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--brand-dark);
            color: white;
            overflow-x: hidden;
        }

        .din-rail-wrapper {
            width: calc(var(--module-width) * 12 + 20px);
            margin: 0 auto 50px auto;
        }

        .din-rail {
            background: linear-gradient(to bottom, #d1d5db, #9ca3af, #d1d5db);
            height: 35px;
            width: 100%;
            position: relative;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            padding: 0 10px;
            border-radius: 2px;
            background-image: linear-gradient(to right, rgba(0,0,0,0.1) 1px, transparent 1px);
            background-size: var(--module-width) 100%;
        }

        .device {
            height: 115px;
            background: white;
            border: 1px solid #999;
            border-radius: 4px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 5px 2px;
            transition: all 0.2s;
            cursor: pointer;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            user-select: none;
            color: black;
            flex-shrink: 0;
            margin-top: -40px;
        }

        .device:hover {
            transform: translateY(-2px);
            border-color: var(--brand-yellow);
            z-index: 10;
        }

        .mod-1 { width: var(--module-width); }
        .mod-2 { width: calc(var(--module-width) * 2); }
        .mod-3 { width: calc(var(--module-width) * 3); }

        .device-label { font-size: 8px; font-weight: bold; text-align: center; text-transform: uppercase; width: 100%; height: 24px; overflow: hidden; line-height: 1.1; }
        .device-toggle { width: 14px; height: 28px; background: #333; border-radius: 2px; margin: 4px 0; }
        .device-spec { font-size: 7px; background: #f0f0f0; width: 90%; text-align: center; border-radius: 2px; font-weight: bold; }

        .rele-v { border-top: 6px solid #ef4444; }
        .uzo { border-top: 6px solid #3b82f6; }
        .avtomat { border-top: 6px solid #10b981; }

        #capture-area {
            background-color: #f3f4f6;
            padding: 50px;
            min-height: 900px;
            width: 780px;
            margin: 0 auto;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid var(--brand-yellow);
            width: 18px;
            height: 18px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        select option {
            background: #1a1a1a;
            color: white;
        }
    </style>
</head>
<body class="flex flex-col md:flex-row h-screen">

    <!-- Sidebar -->
    <aside id="sidebar" class="w-full md:w-80 bg-black p-6 flex flex-col border-r-4 border-yellow-500 overflow-y-auto">
        <div class="mb-6">
            <h1 class="text-3xl font-black text-yellow-500 italic tracking-tighter">TALAS_PROFI</h1>
            <p class="text-[9px] text-gray-400 uppercase tracking-widest mt-1">Shield Configurator | 12 Modules</p>
        </div>

        <!-- AI Assistant -->
        <section class="mb-6 p-4 bg-zinc-900 rounded-lg border border-yellow-500/20">
            <h3 class="text-[10px] font-bold text-yellow-500 mb-2 uppercase flex items-center gap-2">✨ AI Проектировщик</h3>
            <textarea id="ai-prompt" placeholder="Опишите объект..." 
                      class="w-full bg-black border border-gray-700 rounded p-2 text-xs text-white outline-none focus:border-yellow-500 h-16 mb-2"></textarea>
            <button id="ai-generate-btn" onclick="askGeminiToDesign()" class="w-full bg-yellow-600 hover:bg-yellow-500 text-black font-bold py-2 rounded text-[10px] uppercase flex items-center justify-center gap-2 transition">
                <span>Сгенерировать щит</span>
                <div id="ai-spinner" class="spinner hidden"></div>
            </button>
        </section>

        <div class="space-y-6 flex-grow">
            <!-- Dropdown for adding devices -->
            <div>
                <h3 class="text-[10px] font-bold text-gray-500 mb-2 uppercase tracking-widest">Добавить устройство</h3>
                <select id="device-selector" onchange="handleDeviceSelection(this)" class="w-full bg-zinc-900 border-2 border-yellow-500 text-white p-3 rounded text-[11px] font-bold uppercase outline-none cursor-pointer focus:ring-2 focus:ring-yellow-500 transition">
                    <option value="" disabled selected>Выберите из списка...</option>
                    <optgroup label="Автоматические выключатели">
                        <option value="avtomat|Группа|C16|1">Автомат 1P (1 модуль)</option>
                        <option value="avtomat|Ввод|C40|2">Автомат 2P (2 модуля)</option>
                        <option value="avtomat|Группа|C32|3">Автомат 3P (3 модуля)</option>
                    </optgroup>
                    <optgroup label="Защита (УЗО/АВДТ)">
                        <option value="uzo|УЗО|30mA|2">УЗО 2P (2 модуля)</option>
                        <option value="uzo|УЗО|30mA|4">УЗО 4P (4 модуля)</option>
                    </optgroup>
                    <optgroup label="Устройства контроля">
                        <option value="rele-v|РКН|230V|3">Реле напряжения (3 модуля)</option>
                        <option value="rele-v|Вольтметр|230V|1">Вольтметр (1 модуль)</option>
                    </optgroup>
                </select>
            </div>

            <button onclick="addRail()" class="w-full border border-yellow-500/30 text-yellow-500 p-2 rounded hover:bg-yellow-500 hover:text-black transition text-[10px] font-bold uppercase tracking-widest">+ Добавить рейку</button>

            <div class="pt-4 border-t border-zinc-800 space-y-2">
                <button onclick="askGeminiToAudit()" class="w-full bg-blue-900/20 text-blue-400 border border-blue-500/30 p-2 rounded text-[10px] font-bold uppercase hover:bg-blue-500 hover:text-white transition">Проверить безопасность</button>
                <button onclick="downloadImage()" class="w-full bg-yellow-500 text-black p-3 rounded font-black uppercase text-xs hover:bg-white transition flex items-center justify-center gap-2">
                    <span>Скачать схему</span>
                </button>
            </div>
        </div>
    </aside>

    <!-- Canvas -->
    <main class="flex-grow bg-zinc-950 overflow-auto p-8">
        <div id="capture-area" class="shadow-2xl">
            <div class="flex justify-between items-end mb-16 border-b-4 border-black pb-4">
                <div>
                    <h2 class="text-4xl font-black text-black italic leading-none">TALAS_PROFI</h2>
                    <p class="text-black font-bold uppercase text-[10px] mt-2 tracking-widest">Электромонтаж в Таласе</p>
                </div>
                <div class="text-right text-black font-bold text-[10px] uppercase">
                    <p>Объект: <span contenteditable="true" class="border-b border-black/30 px-2">г. Талас</span></p>
                    <p class="mt-1">Дата: <span id="current-date">--.--.----</span></p>
                </div>
            </div>

            <div id="rails-container" class="space-y-2">
                <!-- Rails injected here -->
            </div>

            <div class="mt-20 border-t-2 border-black pt-4 flex justify-between items-center opacity-70">
                <div class="text-[10px] text-black font-bold uppercase italic">WhatsApp: +996 755 000 228</div>
                <div class="text-[10px] text-black font-bold uppercase tracking-widest">12 Модулей на рейку</div>
            </div>
        </div>

        <!-- AI Output -->
        <div id="ai-box" class="hidden mt-6 w-full max-w-[780px] mx-auto bg-black/80 border border-yellow-500 p-4 rounded shadow-xl">
            <h4 id="ai-title" class="text-yellow-500 font-black uppercase text-xs mb-2 italic">✨ Сообщение от ИИ</h4>
            <p id="ai-content" class="text-xs text-gray-200 leading-relaxed"></p>
        </div>
    </main>

    <!-- Edit Modal -->
    <div id="edit-modal" class="fixed inset-0 bg-black/90 hidden items-center justify-center z-50 p-4">
        <div class="bg-white p-6 rounded-lg w-full max-w-xs shadow-2xl">
            <h4 class="font-black uppercase text-sm mb-4 border-b-2 border-black pb-1">Настройка модуля</h4>
            <div class="space-y-4">
                <input type="text" id="edit-label" class="w-full border-2 border-black p-2 text-sm font-bold uppercase" placeholder="Группа">
                <input type="text" id="edit-spec" class="w-full border-2 border-black p-2 text-sm font-bold" placeholder="Номинал">
                <div class="flex gap-2 pt-2">
                    <button onclick="saveEdit()" class="flex-grow bg-black text-white p-2 font-black uppercase text-[10px]">Сохранить</button>
                    <button onclick="deleteElement()" class="bg-red-600 text-white p-2 font-black uppercase text-[10px]">Удалить</button>
                </div>
                <button onclick="closeModal()" class="w-full text-gray-400 font-bold uppercase text-[10px]">Отмена</button>
            </div>
        </div>
    </div>

    <script>
        const apiKey = "";
        let currentEditingElement = null;
        const MAX_MODULES = 12;

        document.getElementById('current-date').innerText = new Date().toLocaleDateString();

        function addRail() {
            const container = document.getElementById('rails-container');
            const railCount = container.querySelectorAll('.din-rail').length + 1;
            const railWrapper = document.createElement('div');
            railWrapper.className = 'din-rail-wrapper';
            railWrapper.innerHTML = `
                <div class="flex justify-between items-center mb-2 px-1">
                    <span class="text-[9px] font-black text-gray-400 uppercase tracking-widest">DIN Rail ${railCount} (12 Mod)</span>
                    <button onclick="this.closest('.din-rail-wrapper').remove()" class="text-red-500 text-[8px] uppercase font-black hover:underline export-hide">Удалить</button>
                </div>
                <div class="din-rail" data-used="0"></div>
            `;
            container.appendChild(railWrapper);
            return railWrapper.querySelector('.din-rail');
        }

        addRail();

        function handleDeviceSelection(selectElement) {
            const val = selectElement.value;
            if (!val) return;

            const [type, name, spec, modules] = val.split('|');
            checkAndAdd(type, name, spec, parseInt(modules));
            
            // Reset selection
            selectElement.selectedIndex = 0;
        }

        function checkAndAdd(type, name, spec, modules) {
            const rails = document.querySelectorAll('.din-rail');
            let placed = false;

            for (let rail of rails) {
                let used = parseInt(rail.getAttribute('data-used'));
                if (used + modules <= MAX_MODULES) {
                    addDeviceToRail(rail, type, name, spec, modules);
                    rail.setAttribute('data-used', used + modules);
                    placed = true;
                    break;
                }
            }

            if (!placed) {
                const newRail = addRail();
                addDeviceToRail(newRail, type, name, spec, modules);
                newRail.setAttribute('data-used', modules);
            }
        }

        function addDeviceToRail(rail, type, name, spec, modules) {
            const device = document.createElement('div');
            // Support widths up to 4 modules
            const widthClass = `mod-${modules}`;
            device.className = `device ${widthClass} ${type}`;
            device.setAttribute('data-mod', modules);
            device.innerHTML = `
                <div class="device-label">${name}</div>
                <div class="device-toggle"></div>
                <div class="device-spec">${spec}</div>
            `;
            device.onclick = (e) => { e.stopPropagation(); openModal(device); };
            rail.appendChild(device);
        }

        function openModal(el) {
            currentEditingElement = el;
            document.getElementById('edit-label').value = el.querySelector('.device-label').innerText;
            document.getElementById('edit-spec').value = el.querySelector('.device-spec').innerText;
            document.getElementById('edit-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('edit-modal').style.display = 'none'; }

        function saveEdit() {
            if (currentEditingElement) {
                currentEditingElement.querySelector('.device-label').innerText = document.getElementById('edit-label').value;
                currentEditingElement.querySelector('.device-spec').innerText = document.getElementById('edit-spec').value;
            }
            closeModal();
        }

        function deleteElement() {
            if (currentEditingElement) {
                const rail = currentEditingElement.parentElement;
                const mod = parseInt(currentEditingElement.getAttribute('data-mod'));
                const used = parseInt(rail.getAttribute('data-used'));
                rail.setAttribute('data-used', used - mod);
                currentEditingElement.remove();
            }
            closeModal();
        }

        // AI Logic
        async function fetchGemini(prompt, sys) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const res = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    contents: [{parts: [{text: prompt}]}],
                    systemInstruction: {parts: [{text: sys}]}
                })
            });
            const data = await res.json();
            return data.candidates[0].content.parts[0].text;
        }

        async function askGeminiToDesign() {
            const prompt = document.getElementById('ai-prompt').value;
            if (!prompt) return;
            const btn = document.getElementById('ai-generate-btn');
            const spinner = document.getElementById('ai-spinner');
            btn.disabled = true; spinner.classList.remove('hidden');

            const sys = `Ты электрик Talas_profi. Спроектируй щит. Учти: 12 модулей в рейке. 
            Верни JSON: {"rails": [{"devices": [{"type": "avtomat|uzo|rele-v", "name": "...", "spec": "...", "modules": 1|2|3|4}]}]}.`;

            try {
                const text = await fetchGemini(`Объект: ${prompt}`, sys);
                const config = JSON.parse(text.replace(/```json|```/g, '').trim());
                document.getElementById('rails-container').innerHTML = '';
                config.rails.forEach(rData => {
                    const rail = addRail();
                    let used = 0;
                    rData.devices.forEach(d => {
                        if (used + d.modules <= 12) {
                            addDeviceToRail(rail, d.type, d.name, d.spec, d.modules);
                            used += d.modules;
                        }
                    });
                    rail.setAttribute('data-used', used);
                });
            } catch (e) {
                console.error(e);
                alert("Ошибка ИИ. Попробуйте проще.");
            } finally {
                btn.disabled = false; spinner.classList.add('hidden');
            }
        }

        async function askGeminiToAudit() {
            const devices = Array.from(document.querySelectorAll('.device')).map(d => d.querySelector('.device-label').innerText);
            if (!devices.length) return;
            const res = await fetchGemini(`Проверь щит: ${devices.join(', ')}`, "Найди ошибки безопасности (нет УЗО, нет РКН). Кратко.");
            showAIBox("Аудит безопасности", res);
        }

        function showAIBox(title, text) {
            const box = document.getElementById('ai-box');
            document.getElementById('ai-title').innerText = title;
            document.getElementById('ai-content').innerText = text;
            box.classList.remove('hidden');
            box.scrollIntoView({behavior: 'smooth'});
        }

        function downloadImage() {
            const toHide = document.querySelectorAll('.export-hide');
            toHide.forEach(el => el.style.opacity = '0');
            html2canvas(document.getElementById('capture-area'), { scale: 2 }).then(canvas => {
                const a = document.createElement('a');
                a.download = `TalasProfi_12mod_${Date.now()}.png`;
                a.href = canvas.toDataURL();
                a.click();
                toHide.forEach(el => el.style.opacity = '1');
            });
        }
    </script>
</body>
</html>
