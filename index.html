<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talas_Profi | Минимализм</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        
        :root {
            --gold: #FBBF24;
            --black: #000000;
            --dark-gray: #0A0A0A;
            --border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--black);
            color: white;
            margin: 0;
            line-height: 1.5;
        }

        header {
            border-bottom: 1px solid var(--border);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(5px);
        }

        .card {
            background: var(--dark-gray);
            border: 1px solid var(--border);
            padding: 1.5rem;
            transition: border-color 0.3s ease;
        }
        .card:hover {
            border-color: var(--gold);
        }

        .btn {
            background: var(--gold);
            color: black;
            font-weight: 700;
            padding: 0.75rem 1.5rem;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
            display: inline-block;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.9; }

        .admin-table { 
            width: 100%; 
            border-collapse: collapse; 
            font-size: 0.85rem; 
        }
        .admin-table th { 
            text-align: left; 
            padding: 1rem; 
            color: var(--gold); 
            border-bottom: 1px solid var(--border); 
            text-transform: uppercase;
        }
        .admin-table td { 
            padding: 1rem; 
            border-bottom: 1px solid rgba(255,255,255,0.02); 
        }

        .hidden { display: none !important; }
        .section { display: none; }
        .section.active { display: block; animation: simpleFade 0.3s ease; }
        
        @keyframes simpleFade {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <header class="sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 h-16 flex justify-between items-center">
            <!-- СКРЫТАЯ КНОПКА (ЛОГОТИП) -->
            <div class="flex items-center gap-4 cursor-pointer select-none" onclick="handleSecretClick()">
                <i class="fas fa-hammer text-gold text-xl"></i>
                <h1 class="text-lg font-black uppercase tracking-tighter">Talas<span class="text-gold">_Profi</span></h1>
            </div>
            <nav class="flex gap-6 text-[10px] font-bold uppercase tracking-widest text-gray-400">
                <button onclick="changeSection('home')" class="hover:text-white transition">Главная</button>
                <button onclick="changeSection('catalog')" class="hover:text-white transition">Мастера</button>
                <!-- КНОПКА ВХОДА С ПАРОЛЕМ -->
                <button onclick="adminAuthPrompt()" class="text-white border-b border-gold pb-1">Вход</button>
            </nav>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-6 py-12">
        
        <!-- ГЛАВНЫЙ ЭКРАН -->
        <section id="view-home" class="section active text-center py-20">
            <h2 class="text-4xl md:text-6xl font-black uppercase mb-6">Профессиональный <br>Сервис <span class="text-gold">Талас</span></h2>
            <p class="text-gray-400 max-w-lg mx-auto mb-8">Минималистичная база проверенных мастеров. Только индустриальное качество.</p>
            <div class="btn" onclick="changeSection('catalog')">Смотреть каталог</div>
        </section>

        <!-- КАТАЛОГ -->
        <section id="view-catalog" class="section">
            <div class="flex items-center justify-between mb-10 border-l-4 border-gold pl-4">
                <h3 class="text-2xl font-bold uppercase italic">Наши специалисты</h3>
            </div>
            <div id="catalog-list" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </section>

        <!-- АДМИНКА -->
        <section id="view-admin" class="section">
            <div class="flex justify-between items-center mb-8">
                <div class="flex items-center gap-4">
                    <h2 class="text-2xl font-black uppercase text-red-600">Админ-панель</h2>
                    <span class="bg-red-600/10 text-red-500 text-[10px] px-2 py-1 rounded border border-red-600/20 font-bold uppercase">База данных</span>
                </div>
                <button onclick="changeSection('home')" class="text-[10px] text-gray-500 hover:text-white uppercase tracking-widest">Закрыть</button>
            </div>
            <div class="overflow-x-auto border border-white/5">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Мастер</th>
                            <th>Телефон</th>
                            <th>Действие</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body"></tbody>
                </table>
            </div>
        </section>

    </main>

    <script>
        const storageKey = 'tp_database';
        const secretCode = "31082001";
        
        const defaultData = [
            { id: 1, name: "Ислам", cat: "Укладка кирпича", phone: "+996755000228" },
            { id: 2, name: "Азамат", cat: "Сантехника", phone: "+996700112233" }
        ];

        let db = JSON.parse(localStorage.getItem(storageKey)) || defaultData;
        if (!localStorage.getItem(storageKey)) localStorage.setItem(storageKey, JSON.stringify(db));

        function changeSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            if (id === 'catalog') renderCatalog();
        }

        function renderCatalog() {
            const list = document.getElementById('catalog-list');
            list.innerHTML = db.map(m => `
                <div class="card">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <div class="text-[10px] font-bold text-gold uppercase mb-1">${m.cat}</div>
                            <h4 class="text-xl font-bold uppercase tracking-tight">${m.name}</h4>
                        </div>
                        <i class="fas fa-check-circle text-gold text-sm"></i>
                    </div>
                    <div class="flex justify-between items-center text-xs text-gray-500 border-t border-white/5 pt-4">
                        <span><i class="fas fa-phone-alt mr-2 text-gold"></i>${m.phone}</span>
                        <a href="https://wa.me/${m.phone.replace(/\+/g,'')}" class="hover:text-gold uppercase font-bold transition">WhatsApp</a>
                    </div>
                </div>
            `).join('');
        }

        // ЛОГИКА ВХОДА
        let clicks = 0;
        let lastTime = 0;

        function handleSecretClick() {
            const now = Date.now();
            if (now - lastTime > 1500) clicks = 0;
            clicks++;
            lastTime = now;
            if (clicks === 5) adminAuthPrompt();
        }

        function adminAuthPrompt() {
            const pass = prompt("Доступ ограничен. Введите код:");
            if (pass === secretCode) {
                clicks = 0;
                changeSection('admin');
                renderAdmin();
            } else if (pass !== null) {
                alert("Неверный код доступа");
            }
        }

        function renderAdmin() {
            const table = document.getElementById('admin-table-body');
            table.innerHTML = db.map(m => `
                <tr class="hover:bg-white/[0.02] transition">
                    <td class="text-gray-600 font-mono">#${m.id}</td>
                    <td class="font-bold text-white uppercase text-xs">${m.name}</td>
                    <td class="text-gold font-bold">${m.phone}</td>
                    <td>
                        <button onclick="removeMaster(${m.id})" class="text-red-500 hover:text-red-400 transition text-[10px] font-bold uppercase tracking-tighter">
                            <i class="fas fa-trash-alt mr-1"></i> Удалить
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function removeMaster(id) {
            if (confirm("Вы уверены, что хотите удалить этого мастера из базы?")) {
                db = db.filter(m => m.id !== id);
                localStorage.setItem(storageKey, JSON.stringify(db));
                renderAdmin();
            }
        }

        // Первоначальный рендер каталога
        renderCatalog();
    </script>
</body>
</html>
